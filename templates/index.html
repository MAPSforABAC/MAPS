<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>ABAC Policy Generator</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="overlay">
    <div class="container">
      <h1 class="title">ABAC Policy Generator</h1>
      <p class="subtitle">Upload your meeting ZIP bundle, pick a provider & model, and download your policy.zip</p>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          <div class="flash">
            {% for m in messages %}
              <p>{{ m }}</p>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <!-- Upload Form -->
      <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data" class="upload-form">
        <label for="zipfile" class="file-label">Choose your ZIP file</label>
        <input type="file" id="zipfile" name="zipfile" accept=".zip" required />

        <div class="grid-2">
          <div class="field">
            <label for="provider">Provider</label>
            <select id="provider" name="provider" class="select">
              {% for val, label in providers %}
                <option value="{{ val }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>

          <div class="field">
            <label for="mode">Mode</label>
            <select id="mode" name="mode" class="select">
              {% for val, label in modes %}
                <option value="{{ val }}">{{ label }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <button type="submit" class="btn">Generate Policy ZIP</button>
      </form>
    </div>
  </div>
</body>
</html>
